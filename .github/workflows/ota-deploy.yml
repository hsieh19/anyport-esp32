name: ESP32 OTA Deploy

on:
  push:
    tags:
      - 'v*' # 当推送 v1.4.0, v1.5.0 等标签时触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # 必须设为 0 以获取提交日志

      - name: Extract Version from Tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install ESP32 Platform
        run: |
          arduino-cli core update-index
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          # 锁定使用 2.0.14 版本
          arduino-cli core install esp32:esp32@2.0.14 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install Libraries
        run: |
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "MQTT"
          arduino-cli lib install "Ethernet"
          arduino-cli lib install "ModbusMaster"
          arduino-cli lib install "NTPClient"

      - name: Compile Firmware
        # 根据用户 IDE 截图对齐参数：开启 USB CDC，设置 DIO 模式，4MB Flash，以及最重要的 Minimal SPIFFS 分区表
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32c3:CDCOnBoot=cdc,FlashMode=dio,FlashSize=4M,PartitionScheme=min_spiffs \
            --output-dir ./build \
            ./AnyPortGateway/AnyPortGateway.ino

      - name: Prepare R2 Structure
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          rm -rf out
          
          # 1. 准备本地输出目录结构 (对应 anyport 目录下的结构)
          OTA_DIR="out/Firmware/OTA Updates/ESP32C3"
          FULL_DIR="out/Firmware/Full Firmware Packages/ESP32C3"
          mkdir -p "$OTA_DIR" "$FULL_DIR"
          
          # 2. 处理 OTA 固件
          cp ./build/AnyPortGateway.ino.bin "$OTA_DIR/anyport_Firmware_AnyPortGateway_v${VERSION}.bin"
          
          # 3. 生成版本信息 (anyport_version.json)
          awk "/## \[$VERSION\]/{flag=1;next}/## \[/{flag=0}flag" CHANGELOG.md > temp_changelog.txt
          ESCAPED_LOG=$(python3 -c 'import json, sys; print(json.dumps(sys.stdin.read().strip()))' < temp_changelog.txt)
          echo "{ \"version\": \"$VERSION\", \"changelog\": $ESCAPED_LOG }" > "$OTA_DIR/anyport_version.json"

          # 4. 合并全量固件包 (用于 WebSerial 刷机)
          pip install esptool
          FULL_BIN_NAME="anyport_Full_v${VERSION}.bin"
          esptool.py --chip esp32c3 merge_bin \
            -o "$FULL_DIR/$FULL_BIN_NAME" \
            --flash_mode dio \
            --flash_size 4MB \
            --flash_freq 40m \
            0x0 ./build/AnyPortGateway.ino.bootloader.bin \
            0x8000 ./build/AnyPortGateway.ino.partitions.bin \
            0x10000 ./build/AnyPortGateway.ino.bin
          
          # 5. 生成刷机工具清单 (manifest.json)
          MD5_HASH=$(md5sum "$FULL_DIR/$FULL_BIN_NAME" | cut -d ' ' -f 1)
          RELEASE_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{
            \"version\": \"$VERSION\",
            \"filename\": \"$FULL_BIN_NAME\",
            \"md5\": \"$MD5_HASH\",
            \"release_time\": \"$RELEASE_TIME\"
          }" > "$FULL_DIR/manifest.json"

      - name: Upload to Cloudflare R2
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --follow-symlinks
        env:
          AWS_S3_BUCKET: ${{ secrets.R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          AWS_REGION: auto
          SOURCE_DIR: "./out"
          DEST_DIR: "github-release-mirror/anyport"
