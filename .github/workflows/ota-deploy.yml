name: ESP32 OTA Deploy

on:
  push:
    tags:
      - 'v*' # 当推送 v1.4.0, v1.5.0 等标签时触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # 必须设为 0 以获取提交日志

      - name: Extract Version from Tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install ESP32 Platform
        run: |
          arduino-cli core update-index
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          # 锁定使用 2.0.14 版本
          arduino-cli core install esp32:esp32@2.0.14 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install Libraries
        run: |
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "MQTT"
          arduino-cli lib install "Ethernet"
          arduino-cli lib install "ModbusMaster"
          arduino-cli lib install "NTPClient"

      - name: Compile Firmware
        # 根据用户 IDE 截图对齐参数：开启 USB CDC，设置 DIO 模式，4MB Flash，以及最重要的 Minimal SPIFFS 分区表
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32c3:CDCOnBoot=cdc,FlashMode=dio,FlashSize=4M,PartitionScheme=min_spiffs \
            --output-dir ./build \
            ./AnyPortGateway/AnyPortGateway.ino

      - name: Prepare R2 Structure
        run: |
          # 1. 创建符合 Worker 预想的目录结构
          mkdir -p sync/anyport/Firmware
          
          # 2. 复制固件并重命名
          cp ./build/AnyPortGateway.ino.bin ./sync/anyport/Firmware/AnyPortGateway_v${{ steps.get_version.outputs.VERSION }}.bin
          
          # 3. 从 CHANGELOG.md 中提取对应版本的更新日志 (保留换行)
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          awk "/## \[$VERSION\]/{flag=1;next}/## \[/{flag=0}flag" CHANGELOG.md > temp_changelog.txt
          
          # 使用 Python 进行标准的 JSON 转义（处理引号、换行等）
          ESCAPED_LOG=$(python3 -c 'import json, sys; print(json.dumps(sys.stdin.read().strip()))' < temp_changelog.txt)
          
          # 4. 生成 version.json
          echo "{ \"version\": \"$VERSION\", \"changelog\": $ESCAPED_LOG }" > ./sync/anyport/version.json

      - name: Sync to Cloudflare R2
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          AWS_REGION: auto
          SOURCE_DIR: './sync'
          DEST_DIR: '' # 直接同步到根，内部已维护 anyport 层级
